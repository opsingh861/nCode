name: Bug Report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please be as detailed as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I upload a workflow with a Postgres node, the generated Python code throws a NameError...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Upload the attached workflow JSON
        2. Click "Generate"
        3. Observe error in code preview
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or screenshots.
    validations:
      required: true

  - type: input
    id: workflow-json
    attributes:
      label: Workflow JSON (optional)
      description: Paste a minimal reproducible n8n workflow JSON, or link to a Gist.
      placeholder: https://gist.github.com/...

  - type: dropdown
    id: python-version
    attributes:
      label: Python version
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13+"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: dropdown
    id: deploy-mode
    attributes:
      label: How are you running nCode?
      options:
        - Local (uvicorn)
        - Docker Compose
        - Docker (backend only)
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I have included sufficient detail to reproduce the issue
          required: true
