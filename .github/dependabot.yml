version: 2
updates:
  # Frontend dependencies (npm)
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "opsingh861"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    allow:
      - dependency-type: "all"
    ignore: []

  # Backend dependencies (Python)
  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
    open-pull-requests-limit: 10
    reviewers:
      - "opsingh861"
    commit-message:
      prefix: "deps"
      include: "scope"
    allow:
      - dependency-type: "all"
    ignore: []

  # Docker and docker-compose
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 5
    reviewers:
      - "opsingh861"
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
    open-pull-requests-limit: 5
    reviewers:
      - "opsingh861"
    commit-message:
      prefix: "ci"
      include: "scope"
